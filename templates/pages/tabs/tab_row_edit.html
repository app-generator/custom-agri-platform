{% extends "layouts/base.html" %}
{% load static custom_tags %}

{% block content %}

    <div class="m-4">
        <div class="px-4 pt-6 bg-white border border-gray-200 rounded-lg shadow-sm dark:border-gray-700 sm:p-6 dark:bg-gray-800">
            <h1 class="text-lg font-semibold text-gray-900 dark:text-white">Edit Row</h1>
            <hr class="my-3" />

            <form method="post">
                {% csrf_token %}

                <div class="grid grid-cols-2 gap-5 mb-5">
                    {% for field in fields %}
                        <div class="col-span-1">
                            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ field.name }}</label>
    
                            <input
                                type="text"
                                name="field_{{ field.id }}"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                value="{{ cell_map|get_item:field.id|default_if_none:'' }}"
                            >
                        </div>
                    {% endfor %}
                </div>

                <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">Save</button>
            </form>

        </div>
    </div>

{% endblock %}
