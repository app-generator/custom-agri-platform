<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>e-farm.ro</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
        }

        body{
            background:#f9f8e1;
            height:100vh;
            overflow:hidden;
        }

        .container{
            max-width:1100px;
            margin:auto;
            padding:20px;
            height:100vh;
            display:flex;
            flex-direction:column;
        }


        nav{
            display:flex;
            justify-content:flex-end;
            align-items:center;
            padding:10px 0;
        }

        nav a{
            color:#915164;
            text-decoration:none;
            font-weight:500;
        }

        nav a:hover{
            opacity:.8;
        }

        /* divider */

        .divider{
            height:1px;
            background:#915164;
            margin-bottom:25px;
        }

        /* hero */

        .hero{
            display:grid;
            grid-template-columns:7fr 5fr;
            gap:20px;
            align-items:center;
            margin-bottom:20px;
        }

        .hero-left h1{
            font-size:48px;
            font-weight:800;
            color:#915164;
        }

        .hero-right{
            text-align:right;
        }

        .hero-right p{
            font-size:18px;
            color:#915164;
            margin-bottom:20px;
        }

        /* button */

        .btn{
            background:#db573d;
            color:white;
            padding:10px 22px;
            border-radius:12px;
            text-decoration:none;
            font-size:14px;
            font-weight:600;
            display:inline-block;
        }

        .btn:hover{
            opacity:.9;
        }

        /* image section grows to fill remaining space */

        .hero-image{
            flex:1;
            min-height:0;
        }

        .hero-image img{
            width:100%;
            height:100%;
            border-radius:20px;
            object-fit:cover;
        }

        /* footer */

        footer{
            text-align:center;
            margin-top:10px;
            color:#915164;
            font-size:14px;
        }

        /* responsive */

        @media (max-width:768px){
            .hero{
                grid-template-columns:1fr;
            }
            .hero-right{
                text-align:left;
            }
        }
    </style>
</head>
