{% extends "layouts/base.html" %}
{% load static %}

{% block content %}

    <div class="m-4">
        <div class="px-4 pt-6 bg-white border border-gray-200 rounded-lg shadow-sm dark:border-gray-700 sm:p-6 dark:bg-gray-800">
            <h1 class="text-lg font-bold text-gray-900 dark:text-white mb-5">Add new Sheet</h1>

            <form class="mt-8 space-y-6" method="post" enctype="multipart/form-data">
                {% csrf_token %}

                {% for field in form %}
                    <div>
                        <label for="{{ field.name }}" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}

                <button class="text-white bg-primary-700 hover:bg-primary-800 font-medium rounded-lg text-sm px-5 py-2.5">Save</button>

            </form>
        </div>
    </div>

{% endblock content %}
